name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      MONGO_URI: mongodb://127.0.0.1:27017/inventory-test
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: test-secret
      JWT_EXPIRES_IN: 15m
      ENABLE_INVENTORY_ALERTS_JOB: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Wait for MongoDB
        run: |
          for i in {1..10}; do
            nc -z 127.0.0.1 27017 && echo "Mongo is up" && exit 0
            echo "Waiting for Mongo..."
            sleep 2
          done
          exit 1

      - name: Wait for Redis
        run: |
          for i in {1..10}; do
            nc -z 127.0.0.1 6379 && echo "Redis is up" && exit 0
            echo "Waiting for Redis..."
            sleep 2
          done
          exit 1

      - name: Run tests
        run: npm test